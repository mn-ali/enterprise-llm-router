<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navy AI Playground</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --user-msg: rgba(59, 130, 246, 0.2);
            --bot-msg: rgba(255, 255, 255, 0.05);
            --error-msg: rgba(239, 68, 68, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(147, 51, 234, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 900px;
            height: calc(100vh - 4rem);
            display: flex;
            flex-direction: column;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background-color: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 10px #22c55e;
        }

        .settings-btn {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .settings-btn:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.1);
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .message {
            max-width: 85%;
            padding: 1.25rem;
            border-radius: 16px;
            line-height: 1.6;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: var(--user-msg);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-bottom-right-radius: 4px;
        }

        .message.bot {
            align-self: flex-start;
            background: var(--bot-msg);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
        }

        .message.error {
            align-self: flex-start;
            background: var(--error-msg);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-bottom-left-radius: 4px;
            color: #fca5a5;
        }

        .message img {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 10px;
            max-height: 300px;
            object-fit: contain;
        }

        .message-content h3 { margin-bottom: 0.5rem; }
        .message-content pre { 
            background: rgba(0,0,0,0.5); 
            padding: 1rem; 
            border-radius: 8px; 
            overflow-x: auto;
            margin: 1rem 0;
        }
        .message-content code { font-family: monospace; }
        .message-content p { margin-bottom: 1rem; }
        .message-content p:last-child { margin-bottom: 0; }

        .input-area {
            padding: 1.5rem 2rem;
            border-top: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.2);
        }

        .image-preview-container {
            display: none;
            gap: 10px;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .image-preview {
            position: relative;
            width: 80px;
            height: 80px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
        }

        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-preview .remove-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-wrapper {
            display: flex;
            gap: 1rem;
            align-items: flex-end;
        }

        .upload-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            width: 48px;
            height: 48px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .upload-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .upload-btn svg {
            width: 24px;
            height: 24px;
        }

        .text-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            resize: none;
            min-height: 48px;
            max-height: 200px;
            font-size: 1rem;
            line-height: 1.5;
            transition: border-color 0.2s;
        }

        .text-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .text-input::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            background: var(--accent);
            border: none;
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background: var(--accent-hover);
        }
        
        .send-btn:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
            opacity: 0.5;
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
            margin-left: 2px;
        }

        .loader {
            display: inline-flex;
            gap: 4px;
        }

        .loader span {
            width: 6px;
            height: 6px;
            background: var(--text-main);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loader span:nth-child(1) { animation-delay: -0.32s; }
        .loader span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>
            <div class="status-dot"></div>
            Navy AI Playground
        </h1>
        <button class="settings-btn" id="clearBtn">Clear Chat</button>
    </div>

    <div class="chat-area" id="chatArea">
        <div class="message bot">
            <div class="message-content">
                <p>Hello! I am connected via the Cloudflare AI Gateway to your LiteLLM Proxy.</p>
                <p>Type a message or attach an image to get started. 🚀</p>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="image-preview-container" id="imagePreviewContainer"></div>
        <div class="input-wrapper">
            <input type="file" id="fileInput" accept="image/*" style="display: none;" multiple>
            <button class="upload-btn" id="uploadBtn" title="Attach Image">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                </svg>
            </button>
            <textarea class="text-input" id="promptInput" placeholder="Send a message to deepseek v3.2..." rows="1"></textarea>
            <button class="send-btn" id="sendBtn">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                </svg>
            </button>
        </div>
    </div>
</div>

<script>
    // Use Railway directly since Cloudflare blocks CORS preflight from local HTML files
    const ENDPOINT = `https://ai-api-router.up.railway.app/chat/completions`;
    
    // Auth Keys
    const LITELLM_KEY = 'sk-l13Ly9t3ta7WOcKsNsjwTA';
    const MODEL_NAME = 'navy-gpt-4o'; // Calls Navy AI GPT-4o

    // UI Elements
    const chatArea = document.getElementById('chatArea');
    const promptInput = document.getElementById('promptInput');
    const sendBtn = document.getElementById('sendBtn');
    const clearBtn = document.getElementById('clearBtn');
    const uploadBtn = document.getElementById('uploadBtn');
    const fileInput = document.getElementById('fileInput');
    const imagePreviewContainer = document.getElementById('imagePreviewContainer');

    // State
    let conversationHistory = [
        { role: "system", content: "You are a helpful AI assistant. You MUST always respond in English, regardless of the input." }
    ];
    let pendingImages = []; // Array of base64 strings

    // ----------------------------------------------------
    // Auto-resize textarea
    // ----------------------------------------------------
    promptInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
        if(this.value.trim().length > 0) {
            sendBtn.style.opacity = '1';
        }
    });

    promptInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    // ----------------------------------------------------
    // Image Handling
    // ----------------------------------------------------
    uploadBtn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
        const files = Array.from(e.target.files);
        files.forEach(file => {
            const reader = new FileReader();
            reader.onload = (event) => {
                const base64Data = event.target.result;
                pendingImages.push(base64Data);
                renderImagePreviews();
            };
            reader.readAsDataURL(file);
        });
        fileInput.value = ''; // reset
    });

    function renderImagePreviews() {
        imagePreviewContainer.innerHTML = '';
        if (pendingImages.length > 0) {
            imagePreviewContainer.style.display = 'flex';
            pendingImages.forEach((imgSrc, index) => {
                const div = document.createElement('div');
                div.className = 'image-preview';
                div.innerHTML = `
                    <img src="${imgSrc}" />
                    <button class="remove-btn" onclick="removeImage(${index})">x</button>
                `;
                imagePreviewContainer.appendChild(div);
            });
        } else {
            imagePreviewContainer.style.display = 'none';
        }
    }

    window.removeImage = function(index) {
        pendingImages.splice(index, 1);
        renderImagePreviews();
    }

    // ----------------------------------------------------
    // Basic Markdown Parser (bold, italic, code blocks, paragraphs)
    // ----------------------------------------------------
    function parseMarkdown(text) {
        let html = text.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
        html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
        html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
        
        // Split by newlines and wrap in paragraphs
        const paragraphs = html.split('\n\n');
        return paragraphs.map(p => {
            if(p.startsWith('<pre>')) return p; // Don't wrap code blocks in p
            const lines = p.split('\n').join('<br>');
            return `<p>${lines}</p>`;
        }).join('');
    }

    // ----------------------------------------------------
    // Chat Logic
    // ----------------------------------------------------
    function appendMessage(role, contentHTML, isError = false) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role} ${isError ? 'error' : ''}`;
        msgDiv.innerHTML = `<div class="message-content">${contentHTML}</div>`;
        chatArea.appendChild(msgDiv);
        chatArea.scrollTop = chatArea.scrollHeight;
        return msgDiv; /* Return element so we can update it or remove loader */
    }

    async function sendMessage() {
        const text = promptInput.value.trim();
        
        if (!text && pendingImages.length === 0) return;

        // Construct user message UI
        let userUIHtml = parseMarkdown(text);
        if (pendingImages.length > 0) {
            pendingImages.forEach(img => {
                userUIHtml += `<br><img src="${img}" style="max-height: 200px; border-radius: 8px; margin-top: 10px;" />`;
            });
        }
        appendMessage('user', userUIHtml);

        // Construct the payload content (supporting OpenAI multimodal structure)
        let messageContent;
        if (pendingImages.length > 0) {
            messageContent = [];
            if (text) {
                messageContent.push({ type: "text", text: text });
            }
            pendingImages.forEach(imgData => {
                messageContent.push({
                    type: "image_url",
                    image_url: { url: imgData }
                });
            });
        } else {
            messageContent = text;
        }

        // Add to history
        conversationHistory.push({
            role: "user",
            content: messageContent
        });

        // Reset inputs
        promptInput.value = '';
        promptInput.style.height = 'auto';
        pendingImages = [];
        renderImagePreviews();

        // Add loading state
        const loaderMsg = appendMessage('bot', '<div class="loader"><span></span><span></span><span></span></div>');
        sendBtn.disabled = true;

        try {
            const response = await fetch(ENDPOINT, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${LITELLM_KEY}`
                },
                body: JSON.stringify({
                    model: MODEL_NAME,
                    messages: conversationHistory,
                    temperature: 0.7
                })
            });

            const data = await response.json();
            
            // Remove Loader
            chatArea.removeChild(loaderMsg);

            if (!response.ok || data.error) {
                const errorText = data.error?.message || JSON.stringify(data.error) || 'Unknown Error';
                appendMessage('error', `<strong>HTTP ${response.status}</strong><br> ${errorText}`, true);
                conversationHistory.pop(); // Remove failed message from context
            } else {
                const assistantContent = data.choices[0].message.content;
                appendMessage('bot', parseMarkdown(assistantContent));
                
                // Add token usage pill
                if(data.usage) {
                    const trackingHtml = `<div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 10px; border-top: 1px solid var(--glass-border); padding-top: 5px;">
                        Tokens — Prompt: ${data.usage.prompt_tokens} | Completion: ${data.usage.completion_tokens} | Total: ${data.usage.total_tokens}
                    </div>`;
                    chatArea.lastChild.querySelector('.message-content').innerHTML += trackingHtml;
                }

                conversationHistory.push({
                    role: "assistant",
                    content: assistantContent
                });
            }
        } catch (error) {
            chatArea.removeChild(loaderMsg);
            appendMessage('error', `<strong>Network Error</strong><br> ${error.message}<br>Make sure the Cloudflare Gateway and your Railway deployment are online.`, true);
            conversationHistory.pop();
        } finally {
            sendBtn.disabled = false;
            promptInput.focus();
        }
    }

    clearBtn.addEventListener('click', () => {
        conversationHistory = [
            { role: "system", content: "You are a helpful AI assistant. You MUST always respond in English, regardless of the input." }
        ];
        chatArea.innerHTML = `
        <div class="message bot">
            <div class="message-content">
                <p>Chat cleared. What would you like to discuss next?</p>
            </div>
        </div>`;
    });
</script>

</body>
</html>
